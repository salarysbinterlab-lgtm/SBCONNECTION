<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SB Connect Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #ecfeff, #f8fafc);
      color: #0f172a;
    }
    main {
      width: min(420px, calc(100vw - 32px));
      border: 1px solid rgba(15, 23, 42, .1);
      border-radius: 24px;
      padding: 24px;
      background: rgba(255, 255, 255, .86);
      box-shadow: 0 18px 48px rgba(15, 23, 42, .08);
      text-align: center;
    }
    h1 { margin: 0; font-size: 22px; font-weight: 900; }
    p { margin: 10px 0 0; color: #64748b; font-weight: 700; line-height: 1.6; }
    button {
      margin-top: 18px;
      border: 0;
      border-radius: 16px;
      padding: 12px 18px;
      background: #0f766e;
      color: #fff;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main>
    <h1>SB Connect Offline</h1>
    <p>ยังไม่มีอินเทอร์เน็ตหรือเซิร์ฟเวอร์ตอบช้า กรุณาเชื่อมต่อแล้วลองใหม่อีกครั้ง</p>
    <button onclick="location.reload()">ลองใหม่</button>
  </main>
</body>
</html>
